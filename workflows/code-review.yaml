id: code-review
name: 代码审查
version: 1.0.0
description: 审查本地变更，并报告正确性、安全性、可维护性和测试风险。
source:
  type: builtin
  id: code-review
  version: 1.0.0
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
stages:
  - id: collect_context
    name: 收集上下文
    instructions: |
      用简体中文明确本次审查范围，并收集支撑审查所需的最小上下文。
      像人类 reviewer 一样，先理解变更想解决什么问题，再看 diff 是否真的服务于这个目标。
      优先查看本地差异、变更文件、相关测试、调用方和配置；必要时阅读相邻代码理解约定。
      追踪变更的调用路径和数据流，找出最可能发生回归的入口、边界和错误路径。
      区分已审查范围和未覆盖范围，避免把未查看的代码当作事实。
      不要修改文件，不要提前输出最终审查结论。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - changed_files
      - review_scope
  - id: identify_risks
    name: 识别风险
    instructions: |
      以代码审查视角识别具体、可操作的问题，优先关注正确性、回归、安全、数据损坏、并发/边界条件、可维护性和测试缺口。
      像负责任的 reviewer 一样，先寻找会真实伤害用户、系统稳定性或后续维护的缺陷，再考虑风格问题。
      每个发现必须包含文件位置、问题机制、可能影响、严重程度和建议修复方向。
      对每个可疑点做反证思考：是否有测试、调用约束或上游校验已经覆盖它；证据不足时不要夸大。
      只报告有证据支撑且会实际影响行为或维护的事项；不要把个人偏好、无关风格或泛泛建议列为问题。
      如果没有发现问题，也要明确说明，并列出剩余未验证风险。
    required_outputs:
      - findings
      - severity
  - id: report
    name: 输出审查报告
    instructions: |
      用简体中文输出代码审查报告。
      像给作者可执行反馈一样写报告：问题要可定位、可复现或可推理、可修复。
      报告必须先列 findings，并按严重程度排序；每条包含位置、影响和建议。
      如果没有问题，直接说明“未发现需要修改的问题”，再补充测试缺口或残余风险。
      变更摘要只能放在发现之后，保持简短。
      不要输出与审查无关的实现计划，除非用户明确要求修复。
    required_outputs:
      - review_summary
      - test_gaps
