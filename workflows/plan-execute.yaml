id: plan-execute
name: 计划执行
version: 1.0.0
description: 适用于需要理解、计划、审批、执行、验证和总结的一般任务工作流。
source:
  type: builtin
  id: plan-execute
  version: 1.0.0
routing:
  enabled: true
  auto_start: true
  keywords:
    - 制定计划
    - 规划任务
    - 分析方案
  examples:
    - 先分析需求并制定执行计划
    - 帮我规划这个复杂任务的实施步骤
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
stages:
  - id: understand
    name: 理解任务
    instructions: |
      用简体中文把用户请求整理成可执行任务。
      像人类执行者接手任务一样，先判断用户真正需要的结果、为什么需要它，以及什么样的结果才算有用。
      明确目标、背景、交付物、约束、成功标准和当前假设；把已知事实与推断分开。
      主动识别隐含风险，例如不可逆操作、范围膨胀、信息缺口和与现有状态的冲突。
      信息不足时，优先基于上下文做谨慎假设并标明；只有缺少关键信息会导致错误执行或不可逆操作时才要求用户补充。
      不要在本阶段执行任务或修改文件。
    required_outputs:
      - task_summary
      - assumptions
  - id: plan
    name: 制定计划
    approval_required: true
    instructions: |
      用简体中文制定审批后可直接执行的计划。
      像给自己排工作一样，把探索、决策、执行和验证分清楚，避免把愿望写成步骤。
      步骤要具体到操作顺序、主要输入、预期产出、需要使用的工具或文件范围。
      对关键选择说明取舍：为什么这样做足够、哪里保持保守、哪些事情暂不做。
      包含验证方式或完成判据，并说明哪些步骤可能触发 shell 或文件写入审批。
      保持计划聚焦，不要加入与用户目标无关的探索或优化。
    required_outputs:
      - execution_steps
      - expected_output
  - id: execute
    name: 执行
    instructions: |
      严格按批准计划执行任务，并遵守当前项目的文件访问和工具使用限制。
      像人类开发者执行计划一样，边做边校准事实；发现现实与计划不符时，先停下来说明偏差。
      执行过程中记录关键动作和产出；如果需要偏离计划，先说明原因并请求返工，不要擅自扩大范围。
      文件修改应尽量小且可解释，避免无关格式化、重命名或清理。
      如果工具调用需要审批，照常发起工具调用，让宿主应用处理审批。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
  - id: verify
    name: 验证
    instructions: |
      对照用户目标、计划和预期产出验证执行结果。
      像交付前检查一样，验证“用户关心的结果是否成立”，而不是只确认做过某些步骤。
      优先使用客观证据，例如测试、构建、类型检查、文件检查或可复现的输出。
      明确哪些内容已经验证、哪些没有验证、是否存在失败或残余风险。
      如果验证失败且需要修改执行结果，请请求返工到执行阶段。
    required_checks:
      - result_verified
  - id: summarize
    name: 总结
    instructions: |
      用简体中文总结最终完成情况、交付物、验证结果和后续注意事项。
      像向同事交接一样，突出结论、证据和下一步风险，不隐藏不确定性。
      先给结论，再给必要细节；不要复述所有中间步骤。
      如果有未完成、未验证或被阻塞的部分，明确说明原因和影响。
      不要添加与任务无关的说明。
    required_outputs:
      - final_summary
      - verification_result
