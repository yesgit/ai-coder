id: software-engineering
name: 软件工程
version: 1.0.0
description: 完整的本地编码任务工作流。
source:
  type: builtin
  id: software-engineering
  version: 1.0.0
routing:
  enabled: true
  auto_start: true
  keywords:
    - 修复 bug
    - 实现功能
    - 修改代码
    - 重构代码
  examples:
    - 修复登录页面的崩溃问题并补测试
    - 实现新的 API 并验证构建
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
rework:
  enabled: true
  allowed_targets:
    - requirements      # 需求不明确时返工
    - code_reading      # 需要重新阅读代码时
    - impact_analysis   # 影响分析不完整时
    - plan              # 计划需要调整时
  approval_required: true
  invalidate_downstream: true
stages:
  - id: requirements
    name: 需求确认
    instructions: |
      用简体中文把用户请求转化为可执行的软件工程任务。
      像人类开发者接手任务一样，先判断用户真正想改变的体验或行为，而不是只复述表面文字。
      明确：要解决的问题、期望行为、验收标准、不可触碰的边界、已知环境约束和当前假设。
      主动识别隐含需求，例如兼容性、数据安全、已有用户路径、错误处理和可回滚性。
      如果用户请求含糊，优先结合项目上下文做保守解释，并在 task_summary 或 output_summary 中标明假设。
      只有当缺少信息会导致错误修改、破坏数据或无法选择实现路径时，才将阶段标记为 needs_rework 或 failed 并说明需要用户补充什么。
      不要在本阶段阅读大量代码、制定实现方案或修改文件。
    required_outputs:
      - task_summary
      - acceptance_criteria
  - id: code_reading
    name: 代码阅读
    instructions: |
      阅读与任务直接相关的代码和配置，建立事实基础后再判断修改点。
      像人类开发者调试问题一样，从用户可见行为或入口出发，沿调用链向下追踪到真正负责该行为的位置。
      优先用快速搜索定位入口、调用方、测试、类型定义、配置和相邻实现；只深入阅读与任务有关的文件。
      阅读时不断验证自己的假设：这里为什么这样实现、谁依赖它、哪些测试或类型约束表达了预期行为。
      记录关键文件时说明它们为什么相关，并区分“确认的当前行为”和“仍不确定的部分”。
      注意项目已有风格、命名、错误处理、测试组织和边界约定，后续阶段应以这些发现为依据。
      不要修改文件，不要提前输出完整实现方案；如果发现需求与代码事实冲突，请说明冲突并请求返工到需求确认。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - relevant_files
      - current_behavior
  - id: impact_analysis
    name: 影响分析
    instructions: |
      基于需求和代码阅读结果，分析最小合理改动范围。
      像做变更前的工程评审一样，思考“改这里会影响谁”“有没有更局部的切入点”“最容易出错的边界是什么”。
      明确可能受影响的模块、数据结构、用户可见行为、错误路径、权限或安全边界、测试面和兼容性风险。
      对候选方案做简短取舍：优先选择简单、局部、可验证、符合现有抽象的方案。
      对每个风险给出实际触发条件和验证方式；不要列泛泛的风险清单。
      如果发现必须扩大范围，说明原因、替代方案和不扩大范围的后果。
      不要执行实现，不要引入与当前目标无关的重构建议。
    required_outputs:
      - impact_scope
      - risks
  - id: plan
    name: 计划
    approval_required: true
    instructions: |
      给出审批后可直接执行的实现计划和验证计划。
      像准备自己接下来编码一样写计划：步骤要能指导实际操作，而不是抽象口号。
      实现计划应按顺序列出主要步骤、涉及文件或模块、每步要改变的行为，以及如何保持改动范围最小。
      对关键决策说明为什么选择这条路径，以及放弃了哪些更重或风险更高的做法。
      验证计划应说明要运行的测试、类型检查、构建或手工检查；如果只需要局部验证，也要解释为什么足够。
      标出需要用户审批的文件写入或 shell 命令，但不要用文字请求代替后续实际工具调用。
      不要在计划里承诺无法从当前上下文保证的结果。
    required_outputs:
      - implementation_plan
      - test_plan
  - id: implementation
    name: 实现
    instructions: |
      按批准计划实施最小必要改动，并持续对照前序阶段的验收标准。
      像维护一个长期项目一样编码：优先使用现有模式，保持局部一致性，让后续维护者容易理解。
      修改前如需确认上下文，可以补充读取相关文件；编辑时遵循现有架构、命名、错误处理、格式和测试风格。
      每次改动都要有明确理由；如果发现顺手可改但不影响目标的问题，记录为后续事项而不是混入本次变更。
      只修改完成任务所必需的文件，避免无关格式化、重命名、依赖升级或顺手重构。
      如果实施中发现计划不成立、风险显著增大或需要触碰未审批范围，请停止并请求返工到计划或影响分析阶段。
      阶段输出要说明实际改了哪些行为和文件，而不是只说“已完成”。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
  - id: test
    name: 测试
    instructions: |
      运行与改动风险相匹配的验证，优先选择最能覆盖本次行为变化的测试、类型检查或构建命令。
      像提交代码前自查一样，不只看命令是否通过，还要判断验证是否真正覆盖了风险最高的行为。
      报告每个验证命令、结果和关键失败信息；如果失败，判断是本次改动导致、环境问题还是既有问题。
      如果测试通过但覆盖不足，请明确剩余盲区；如果测试失败，先定位失败与本次改动的关系。
      如果验证无法运行或被审批/环境阻塞，请说明未验证的行为、原因、影响和建议的后续验证。
      不要为了让测试通过而在本阶段扩大实现范围；需要修复时请求返工到实现阶段。
    allowed_tools:
      - shell
    required_checks:
      - tests_passed
  - id: summarize
    name: 总结
    instructions: |
      用简体中文给出面向用户的最终交付摘要。
      像开发者交接工作一样，交代结论、证据和剩余风险，让用户能判断是否可以继续集成或发布。
      优先说明任务是否完成、实际变更、验证结果和仍需注意的风险或限制。
      提到文件时使用项目相对路径；不要复述完整过程，也不要包含与本任务无关的建议。
      如果存在未完成项、未运行验证或失败验证，必须清楚列出原因和影响。
    required_outputs:
      - change_summary
      - verification_result
