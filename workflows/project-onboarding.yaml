id: project-onboarding
name: 项目接入
version: 1.0.0
description: 扫描选中的项目，并创建或增量更新符合 Claude Code 规范的项目画像，包括 CLAUDE.md、rules、skills 和必要的团队设置建议。
source:
  type: builtin
  id: project-onboarding
  version: 1.0.0
routing:
  enabled: true
  auto_start: true
  keywords:
    - 项目接入
    - 项目画像
    - CLAUDE.md
    - 初始化项目
  examples:
    - 扫描这个项目并生成 CLAUDE.md
    - 更新项目画像和 Claude Code 配置
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
rework:
  enabled: true
  allowed_targets:
    - scan_project
    - understand_project
    - draft_memory
  approval_required: true
  invalidate_downstream: true
stages:
  - id: scan_project
    name: 扫描项目
    instructions: |
      在写入任何内容之前先扫描项目并建立事实来源清单。
      像新成员接手项目一样，先找最可靠的入口文档和配置，再用源码验证文档是否可信。
      首先检查项目根目录和 .claude/ 目录下是否已有 Claude Code 画像资产：CLAUDE.md、.claude/CLAUDE.md、CLAUDE.local.md、.claude/rules/、.claude/skills/、.claude/settings.json、.mcp.json、AGENTS.md、其他工具规则文件。
      如果已有 CLAUDE.md、rules、skills 或 AGENTS.md，必须阅读并记录其中应保留的团队规则、架构说明、命令、导入引用、路径作用域和技能流程。
      如果用户要求增量画像、刷新画像、根据近期修改调整画像，或项目已存在 Claude 画像资产，请优先进入增量模式：检查 git status、近期 diff、最近提交摘要或用户指定的变更范围，识别哪些画像内容可能过期。
      增量模式下只阅读“已有画像资产 + 近期变更直接相关文件 + 必要事实来源”，不要重新全面扫描整个项目，除非近期变更显示项目结构发生大规模变化。
      阅读可能作为事实来源的文件，例如 README、包清单、锁文件、tsconfig/vite/electron 配置、CI 工作流、测试目录、关键源码入口、脚本目录和开发文档。
      优先建立项目地图：入口在哪里、主要模块是什么、如何运行和验证、哪些目录不该碰。
      使用快速目录/文本搜索时避开密钥、凭证、生成的依赖目录、大型构建产物和二进制文件。
      输出 inspected_files 时说明每类文件提供了什么事实，不要只列文件名。
      不要修改文件，不要推断没有证据支持的技术栈或规则。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - existing_claude_md_status
      - inspected_files
      - detected_project_type
      - existing_claude_assets
      - recent_change_summary
  - id: understand_project
    name: 理解项目
    instructions: |
      基于扫描阶段的证据，为后续编码代理形成项目理解。
      像准备带新人上手一样，把最影响日常开发决策的信息提炼出来，而不是罗列所有文件。
      识别技术栈、运行入口、架构分层、模块边界、关键数据流、常用命令、测试策略、编码约定、安全约束和已知风险。
      关注“以后改代码时怎么不踩坑”：哪些模式要沿用，哪些命令要先跑，哪些边界不能突破。
      明确项目画像维度：项目用途、运行形态、开发入口、模块地图、常见任务路径、验证路径、敏感资源边界、容易误导代理的陷阱。
      按 Claude Code 资产边界归类信息：每次会话都应加载的稳定事实归入 CLAUDE.md；只对特定路径生效的规则归入 .claude/rules/；多步骤流程、重复操作或长说明归入 .claude/skills/；需要客户端强制或团队共享的配置归入 .claude/settings.json 或 hooks/MCP 建议。
      增量模式下，重点判断近期变更是否改变了：启动/构建/测试命令、架构边界、模块职责、数据流、权限/安全规则、常见开发流程、路径规则适用范围或 skill 的执行步骤。
      对每个变化判断画像动作：无需更新、修正已有 CLAUDE.md、修正某条 rule、新增/更新 skill、建议 settings/hooks/MCP、或需要人工确认。
      每个重要结论都应能追溯到已阅读文件；不确定的命令、约定或架构要明确标为不确定。
      区分“给代理必须遵守的规则”和“帮助理解项目的背景信息”。
      不要编造缺失信息，不要把一次性本地偏好写成团队规则。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - project_overview
      - tech_stack
      - architecture_notes
      - command_notes
      - safety_notes
      - claude_asset_strategy
      - incremental_impact
  - id: draft_memory
    name: 起草 Claude 项目画像
    approval_required: true
    instructions: |
      在写入文件前，先起草符合 Claude Code 规范的项目画像方案和增量更新计划。
      像维护团队工程手册和 Agent 启动上下文一样起草内容：写能持续帮助后续开发者和 Claude 做正确决策的规则、导航和流程。
      先决定每条信息应该落在哪里，不要把所有内容都塞进 CLAUDE.md：
      - CLAUDE.md 或 .claude/CLAUDE.md：每个会话都需要的项目级稳定事实、架构导航、常用命令、必须遵守的协作规则。
      - .claude/rules/*.md：模块化规则；有明确目录或文件类型适用范围时使用 YAML frontmatter 的 paths。
      - .claude/skills/<skill-name>/SKILL.md：重复的多步骤流程、调试/验证/发布/代码生成流程，包含 description frontmatter 和可执行步骤。
      - .claude/settings.json：团队共享的 Claude Code 配置建议，例如 permissions、hooks、MCP 或插件；只在有明确证据和团队共享价值时起草，不写个人偏好或密钥。
      主 CLAUDE.md 草稿必须简洁、有结构、适合作为 Claude Code 的长期项目记忆；目标控制在 200 行以内，优先写稳定规则和高价值导航，避免复制大段 README 或源码说明。
      在靠前位置放置“简要摘要”，用于上下文压缩和任务恢复。
      每条规则都应回答“开发者以后遇到什么情况时该怎么做”，避免空泛描述。
      建议 CLAUDE.md 章节包括：简要摘要、项目概览、技术栈、架构与模块边界、常用命令、开发规则、测试规则、安全规则、工作流说明、Claude 资产地图、已知问题、更新策略。
      在描述清晰的 Markdown 标题下使用项目符号；命令要给出准确命令、用途和适用场景。
      仅对稳定且长期可见的事实来源文件使用 @path/to/file 导入，例如 README.md 或 package.json；不要导入密钥、生成文件、临时文件、庞大产物或容易频繁变化的日志。
      rules 草稿应一文件一主题，文件名描述用途；路径规则必须包含 paths frontmatter，并说明触发目录或文件类型。
      skills 草稿必须包含 SKILL.md 的 description frontmatter，说明何时使用；正文包含目标、输入、步骤、验证和失败处理。只有当流程较长、重复出现或不应每次会话都加载时才建议 skill。
      settings 草稿必须区分“建议写入 .claude/settings.json 的团队配置”和“只能放在本地 .claude/settings.local.json 的个人/机器配置”；不要写入 API key、令牌、本机绝对路径或个人偏好。
      如果已有 Claude 资产，必须明确说明会保留、修改、新增和删除哪些内容，并解释原因。
      增量模式下必须输出补丁式更新方案：列出每个受影响文件、现有内容问题、依据的近期变更、建议变更和不修改其他画像资产的理由。
      增量模式下不要重写整份 CLAUDE.md 或整套 rules/skills；除非旧画像结构已经明显阻碍维护，否则只做局部替换、追加或删除过时条目。
      如果近期变更不足以证明画像需要调整，请明确输出“无需更新”的依据，而不是为了产出而修改。
      不要包含密钥、令牌、私有凭证、个人本地偏好或未经证据支持的规则。
    required_outputs:
      - compact_summary
      - claude_md_draft
      - rules_draft
      - skills_draft
      - settings_recommendations
      - preservation_plan
      - incremental_update_plan
  - id: write_memory
    name: 写入 Claude 项目画像
    approval_required: true
    auto_retry_limit: 2
    instructions: |
      使用已批准的草稿创建或更新 Claude Code 项目画像资产。
      像修改共享团队文档一样谨慎处理已有内容：先保护有价值信息，再补充更准确、更可执行的内容。
      如果 CLAUDE.md、rules、skills 或 settings 已存在，请按增量更新计划谨慎合并，不要整文件粗暴替换。
      除非现有团队指令、导入引用、路径规则、技能流程或安全规则明显过时或错误，否则应予以保留。
      优先写入已批准且确定有价值的资产：主 CLAUDE.md 是默认产物；rules、skills、settings 只有在草稿中有明确用途并已获批准时才创建或更新。
      增量模式下只修改 incremental_update_plan 中列出的资产和条目；不得顺手重排、改写或格式化未受影响内容。
      如果某个近期变更只影响临时行为、实验代码或尚未稳定的方案，不要写入长期画像；可在 update_summary 中列为观察项。
      最终文件必须聚焦、可扫描、适合作为代理上下文；避免粘贴长篇源码清单、完整文档、不稳定观察或个人机器配置。
      文件写入必须通过宿主应用审批；如果审批被拒绝或写入受阻，说明原因和剩余影响。
    allowed_tools:
      - read_file
      - edit_file
    gates:
      - authorized_files_only
    required_outputs:
      - claude_md_path
      - rules_paths
      - skills_paths
      - settings_paths
      - update_summary
      - incremental_changes_applied
  - id: review
    name: 复核接入结果
    instructions: |
      按照 Claude Code 项目记忆、rules、skills 和 settings 的最佳实践复核生成或更新后的项目画像。
      像代码审查一样审查这份项目画像：它是否准确、精简、可执行，是否会误导后续代理。
      检查 CLAUDE.md 是否包含“简要摘要”、项目事实是否有依据、命令是否具体可执行、安全规则是否明确、导入引用是否稳定、是否控制在合理长度，以及已有 CLAUDE.md 内容是否得到尊重。
      检查 .claude/rules/ 是否一文件一主题、路径作用域是否准确、是否避免把全局规则误放为路径规则。
      检查 .claude/skills/ 是否只承载多步骤或重复流程，SKILL.md 是否包含 description frontmatter，步骤是否可执行且不过度依赖当前机器。
      检查 .claude/settings.json 建议是否属于团队共享配置，是否没有密钥、个人偏好或本地路径；需要强制安全边界时是否建议 settings/hooks，而不是只写行为提醒。
      检查文件是否过长、是否混入密钥/个人偏好/未经证实规则、是否复制了不必要的大段文档、是否把推断写成事实。
      增量模式下额外检查：修改是否只覆盖近期变更影响的画像资产，是否保留了未受影响内容，是否删除或修正了过时规则，是否避免把短期实验写成长期项目事实。
      对每个未更新但可能受影响的画像资产，说明为什么暂不更新或需要人工确认。
      报告仍需人工确认的不确定事项，并说明它们对后续编码代理的影响。
    allowed_tools:
      - read_file
    required_outputs:
      - review_summary
      - claude_asset_review
      - incremental_review
      - human_review_items
