id: project-onboarding
name: 项目接入
version: 1.0.0
description: 扫描选中的项目，并创建或更新 CLAUDE.md 作为共享项目记忆。
source:
  type: builtin
  id: project-onboarding
  version: 1.0.0
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
rework:
  enabled: true
  allowed_targets:
    - scan_project
    - understand_project
    - draft_memory
  approval_required: true
  invalidate_downstream: true
stages:
  - id: scan_project
    name: 扫描项目
    instructions: |
      在写入任何内容之前先扫描项目并建立事实来源清单。
      像新成员接手项目一样，先找最可靠的入口文档和配置，再用源码验证文档是否可信。
      首先检查项目根目录是否已有 CLAUDE.md；如果存在，必须阅读并记录其中应保留的团队规则、架构说明、命令和导入引用。
      阅读可能作为事实来源的文件，例如 README、包清单、锁文件、tsconfig/vite/electron 配置、CI 工作流、测试目录和关键源码入口。
      优先建立项目地图：入口在哪里、主要模块是什么、如何运行和验证、哪些目录不该碰。
      使用快速目录/文本搜索时避开密钥、凭证、生成的依赖目录、大型构建产物和二进制文件。
      输出 inspected_files 时说明每类文件提供了什么事实，不要只列文件名。
      不要修改文件，不要推断没有证据支持的技术栈或规则。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - existing_claude_md_status
      - inspected_files
      - detected_project_type
  - id: understand_project
    name: 理解项目
    instructions: |
      基于扫描阶段的证据，为后续编码代理形成项目理解。
      像准备带新人上手一样，把最影响日常开发决策的信息提炼出来，而不是罗列所有文件。
      识别技术栈、运行入口、架构分层、模块边界、关键数据流、常用命令、测试策略、编码约定、安全约束和已知风险。
      关注“以后改代码时怎么不踩坑”：哪些模式要沿用，哪些命令要先跑，哪些边界不能突破。
      每个重要结论都应能追溯到已阅读文件；不确定的命令、约定或架构要明确标为不确定。
      区分“给代理必须遵守的规则”和“帮助理解项目的背景信息”。
      不要编造缺失信息，不要把一次性本地偏好写成团队规则。
    required_outputs:
      - project_overview
      - tech_stack
      - architecture_notes
      - command_notes
      - safety_notes
  - id: draft_memory
    name: 起草 CLAUDE.md
    approval_required: true
    instructions: |
      在写入文件前，先起草目标 CLAUDE.md 内容和增量更新计划。
      像维护团队工程手册一样起草内容：写能持续帮助后续开发者做正确决策的规则和导航。
      草稿必须简洁、有结构、适合作为 Claude Code 的长期项目记忆；优先写稳定规则和高价值导航，避免复制大段 README 或源码说明。
      在靠前位置放置“简要摘要”，用于上下文压缩和任务恢复。
      每条规则都应回答“开发者以后遇到什么情况时该怎么做”，避免空泛描述。
      建议章节包括：简要摘要、项目概览、技术栈、架构与模块边界、常用命令、开发规则、测试规则、安全规则、工作流说明、已知问题、更新策略。
      在描述清晰的 Markdown 标题下使用项目符号；命令要给出准确命令、用途和适用场景。
      仅对稳定且长期可见的事实来源文件使用 @path/to/file 导入，例如 README.md 或 package.json；不要导入密钥、生成文件、临时文件或庞大产物。
      如果已有 CLAUDE.md，必须明确说明会保留、修改、新增和删除哪些内容，并解释原因。
      不要包含密钥、令牌、私有凭证、个人本地偏好或未经证据支持的规则。
    required_outputs:
      - compact_summary
      - claude_md_draft
      - preservation_plan
  - id: write_memory
    name: 写入 CLAUDE.md
    instructions: |
      使用已批准的草稿创建或更新项目根目录下的 CLAUDE.md。
      像修改共享团队文档一样谨慎处理已有内容：先保护有价值信息，再补充更准确、更可执行的内容。
      如果 CLAUDE.md 已存在，请按增量更新计划谨慎合并，不要整文件粗暴替换。
      除非现有团队指令、导入引用或安全规则明显过时或错误，否则应予以保留。
      最终文件必须聚焦、可扫描、适合作为代理上下文；避免粘贴长篇源码清单、完整文档或不稳定观察。
      文件写入必须通过宿主应用审批；如果审批被拒绝或写入受阻，说明原因和剩余影响。
    allowed_tools:
      - read_file
      - edit_file
    gates:
      - authorized_files_only
    required_outputs:
      - claude_md_path
      - update_summary
  - id: review
    name: 复核接入结果
    instructions: |
      按照 Claude Code 项目记忆最佳实践复核生成或更新后的 CLAUDE.md。
      像代码审查一样审查这份项目记忆：它是否准确、精简、可执行，是否会误导后续代理。
      检查是否包含“简要摘要”、项目事实是否有依据、命令是否具体可执行、安全规则是否明确、导入引用是否稳定，以及已有 CLAUDE.md 内容是否得到尊重。
      检查文件是否过长、是否混入密钥/个人偏好/未经证实规则、是否复制了不必要的大段文档。
      报告仍需人工确认的不确定事项，并说明它们对后续编码代理的影响。
    allowed_tools:
      - read_file
    required_outputs:
      - review_summary
      - human_review_items
