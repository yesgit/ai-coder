id: careful-coder
name: 谨慎程序员
version: 1.1.0
description: 把人类资深开发者的"强制例程"软化为可读的纪律——取证、对齐、敌对自审，让模型像谨慎的同事一样工作。
source:
  type: builtin
  id: careful-coder
  version: 1.1.0
routing:
  enabled: true
  auto_start: true
  # 与 software-engineering / plan-execute 错开：careful-coder 是"需要更谨慎"的语义触发器。
  # 直接的"修 bug / 实现功能"应该走 software-engineering 走得更快；只有用户显式说
  # "认真改"、"小心改"、"谨慎"、"敏感模块" 这类时，careful-coder 才胜出。
  keywords:
    - 谨慎
    - 严谨
    - 小心改
    - 认真改
    - 敏感
    - 高风险
    - 不要漏
    - careful
    - high stakes
    - production critical
  examples:
    - 谨慎地修一下未登录访问 /settings 崩溃的问题（涉及鉴权别漏）
    - 严谨地把 parseConfig 改为接收路径而不是字符串，并修所有调用方
    - 这块是敏感模块，请仔细对照同类实现再动手
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
rework:
  enabled: true
  allowed_targets:
    - understand
    - investigate
    - align
    - design
    - implement
  approval_required: false
  invalidate_downstream: true
# v1.1 设计笔记（写给后来者）：
# v1.0 曾经用 required_outputs 强制 LLM 一次性产出 5 个对象数组（investigation_tasks /
# hypotheses / findings / plan_steps / phase_1_self_check 等）+ 跨阶段血脉断言。
# 实证结果：LLM 在长 prompt 下 JSON 频繁烂尾（candidate_count=9, bracket_balance=3），
# 无法在 retry 内自我修复，引擎层卡死。
# v1.1 回归软引导——instructions 描述思维例程、required_outputs 只留少量简单字段，
# 断言只保留扫文本/查结构存在性的低复杂度规则。思想仍在，硬约束让位给 LLM 的实际能力。
stages:
  - id: understand
    name: 理解
    instructions: |
      用简体中文复述用户的真实诉求与"完成的样子"。
      严格区分三类信息：
        - 事实：在代码/配置/历史里可直接核对的；
        - 推断：从事实合理外推但尚未证实的；
        - 假设：你不知道但暂时这样办的（必须在 assumptions 字段显式列出）。
      不要在本阶段编辑文件或制定方案，只产出共识。

      字段输出要求：最终 JSON 的 required_outputs 必须**逐键**填写以下三个字段，
      不要把内容只写在 output_summary 自然语言里：
        - user_goal_restated: 用一两句复述用户的真实诉求
        - definition_of_done: 列出本次任务"完成的样子"（具体可验收的条件）
        - assumptions: 你做的所有假设（数组或多行字符串），没有就写"无明确假设"也比省略好
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - user_goal_restated
      - definition_of_done
      - assumptions
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: investigate
    name: 取证
    instructions: |
      像资深开发者接手陌生模块的反射动作——**先拟定调查任务、逐条取证、复盘是否方案无虞、
      不放心就补任务再调查**。这是 Plan loop 的内循环；走完才允许下结论。

      具体例程（建议自己在脑子里走一遍，但不强制结构化产出）：
        1) 列出本次要查的问题清单（包含至少一条 `git log` 类任务看 commit 意图）；
        2) 每条问题挂一个假设，并列出反向假设（不要只想一种可能）；
        3) 跑取证：grep 同名调用、Read 相邻实现、查 git log/blame；
        4) 取证后判定 confirmed/refuted/inconclusive——inconclusive 的进 unknowns，
           不允许伪装成 finding；
        5) 集群型现象（多个同类页面/入口/模块）必须有一条 task 专门评估集群整体性。

      产物（required_outputs，写在最外层 JSON 里——保持精简，不要塞嵌套对象数组）：
        - similar_callsites: 至少 3 条 path:line + 一句话作用（字符串数组或多行字符串都行）
        - git_history_summary: 跑过的 git log/blame 关键结论（字符串，含 commit hash + 一行 message）
        - unknowns: 你没查清的、查了但 inconclusive 的、主动暴露的"我不知道"
          （字符串数组或多行字符串。写"无"会被引擎判定不诚实）

      在 output_summary（自然语言段）里：明确写"已查实的结论 / 仍存疑的事项"两栏；
      涉及"可能 X 导致 Y 问题/风险/缺口"这类 hedged 表述时必须配 path:line 证据，
      否则按"未取证"处理、归入 unknowns。

      ⚠️ 输出 JSON 时请先在脑里 / 临时编辑器里 JSON.parse 一遍——多余引号、字段名拼错、
      引号未闭合是最常见错误；烂掉宿主会视为字段缺失，retry 时你看到的错误信息会含
      bracket_balance/tail_length 等诊断。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - similar_callsites
      - git_history_summary
      - unknowns
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - unknowns_present
        - hedged_findings_demoted
        - no_trailing_unparsed_payload
  - id: align
    name: 对齐
    instructions: |
      列出本次必须遵守的横向一致性约束（命名/错误处理/日志/i18n/参数风格等），
      逐条列出边界自问（未登录/未授权/未实名/空数据/并发/不可逆/网络失败/超大输入），
      把 understand+investigate 留下的模糊点用 ask_human 强制澄清——不允许出现"我假设"代替提问。
      如果存在不可逆操作（删文件、清数据、git reset 等），请把"是否允许"列入 clarifications_asked。
      output_summary 必须把 lateral_constraints 与 boundary_questions 的每一条都明文列出——
      self_review 阶段只能读到 summary 而非结构化字段，summary 写得粗则 reviewer 无法逐条核对。
    allowed_tools:
      - read_file
    required_outputs:
      - lateral_constraints
      - boundary_questions
      - clarifications_asked
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: design
    name: 设计
    instructions: |
      把 investigate 阶段查实的结论翻成可执行步骤——**每一步都要引用对应的取证证据**，
      不允许凭空设计。同时完成两项自审。

      建议自检例程（写在 output_summary 里，不强制结构化产出）：
        1) 列出 plan steps（每条配 path:line 取证引用 + perf/security/extensibility 三维度考量；
           不涉及就写"不适用：<一句话原因>"，目的是让三维度想过——这是肌肉记忆而非格式要求）；
        2) 给出可验收的 success_criteria（self_review 阶段会逐条核对，含糊措辞会让对账失效）；
        3) 敌对自审：假设挑刺 reviewer 看你的方案，他会怎么打回？至少给 3 条具体反驳并答辩；
        4) 一致性自审：同类条目要么全做、要么全不做；任何偏离写出理由；
        5) 集群型任务（多个同类条目 ≥3）：在 output_summary 里给一张 markdown 矩阵——
           列至少"条目 / 鉴权策略 / 参数 / 备注"，让 implement 一眼看清横向是否齐整。

      避免过度抽象/过度工程：能用现有函数解决就不要新建。
    allowed_tools:
      - read_file
    required_outputs:
      - design_summary
      - adversarial_critique
      - consistency_audit
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: implement
    name: 实施
    instructions: |
      严格按 design 实施最小改动；偏离 design 必须 needs_rework 回到 design。
      改任何一个文件之前，先确保你真的读过它（不只是 grep 过 basename）：
        - 同一目标文件的 Read/Grep 次数 ≥ 3；
        - 本会话内对该文件跑过一次 git log；
        - 涉及不可逆 shell 操作时，先 ask_human 取得用户同意。
      宿主会在工具调用前强制校验上述前置条件，未达到会被 deny 并要求你补齐。这不是平台限制，
      是"先看后改"的纪律。

      **过程中随时与总体目标核对**：每改完一个文件，在自己脑子里对照 understand.user_goal_restated
      与 design.success_criteria，明示这次改动推进/未推进哪一条。如果发现走偏，及时 needs_rework
      回 design 重新规划——不要等到 self_review 阶段才发现。

      改动尽量小、贴近原代码风格。坚决不顺手"清理无关代码"。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
    auto_retry_limit: 1
    hooks:
      pre_tool_use:
        # 注意：Write 不在此列。Write 主要用于新建文件，目标路径还不存在时无法
        # "先 Read/Grep 3 次"，硬挂会让"新建文件"类任务卡死或刷形式次数。
        # Write 的纪律靠 design + self_review 兜底。
        - when:
            tool:
              - Edit
              - MultiEdit
          require:
            same_file_reads_min: 3
            shell_must_have_run:
              - "git log "
          on_fail: "改既有代码之前请先充分了解上下文：对目标文件至少 Read/Grep 3 次，并对它跑过一次 git log。"
        - when:
            tool: Bash
            command_contains:
              - "rm "
              - "git reset"
              - "git clean"
              - "drop table"
              - "truncate"
          require:
            ask_human_consent: true
          on_fail: "这是不可逆操作，必须先在本阶段通过 ask_human 取得用户明确确认。"
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: self_review
    name: 自审
    instructions: |
      你现在是一个独立的、敌对的 code reviewer，**不是作者**，看不到 implement 阶段的辩解，只看代码事实。
      逐条核对 align.lateral_constraints 与 align.boundary_questions（在前序阶段 output_summary 中可读）
      对应到当前 diff：
        - 漏覆盖的项目必须写明缺口；
        - 即使全部覆盖，也要在 review_findings 给出一份"逐项核对"清单（每条约束/边界 → 在 diff 哪里被处理）。

      review 的内功（写在 output_summary 里，不强制结构化字段）：
        - 真去跑测试/构建/lint——不允许只口头说"应该通过"；如果跑了，把命令与结果摘要写在 review_findings；
        - 三维度挑刺：性能 / 安全 / 扩展性——发现 high 级风险时不允许 pass；
        - 自洽性纪律：一旦 review_findings/residual_risks 出现"blocker / critical / 严重不一致 / 安全问题 /
          高优先级问题"这类阻塞类描述，就**不允许**把 rework_decision 写成 pass——
          要么改描述（已修复 + diff 位置）、要么改 needs_rework。引擎会自动判定不自洽并回炉重做。

      返工触发协议：
        - 决定回炉时，最外层 JSON 必须 status="needs_rework"、rework_target_stage_id 是
          implement/design/investigate 之一、rework_reason 用一两句中文说明缺口；
        - 不要把 needs_rework 仅写进 rework_decision 字段——引擎只识别最外层 status。
        - 通过时：status="completed"，rework_decision="pass"，review_findings 必须给出逐项核对清单。

      仅允许只读工具：Read 看 diff、shell 跑 git diff/test/build/lint，禁止 edit。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - review_findings
      - rework_decision
      - residual_risks
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - review_self_consistency
        - needs_rework_target_required
        - hedged_findings_demoted
        - no_trailing_unparsed_payload
