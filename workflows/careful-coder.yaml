id: careful-coder
name: 谨慎程序员
version: 1.2.0
description: 把人类资深开发者的"强制例程"软化为可读的纪律——取证、对齐、敌对自审，让模型像谨慎的同事一样工作。
source:
  type: builtin
  id: careful-coder
  version: 1.2.0
routing:
  enabled: true
  auto_start: true
  # 与 software-engineering / plan-execute 错开：careful-coder 是"需要更谨慎"的语义触发器。
  # 直接的"修 bug / 实现功能"应该走 software-engineering 走得更快；只有用户显式说
  # "认真改"、"小心改"、"谨慎"、"敏感模块" 这类时，careful-coder 才胜出。
  keywords:
    - 谨慎
    - 严谨
    - 小心改
    - 认真改
    - 敏感
    - 高风险
    - 不要漏
    - careful
    - high stakes
    - production critical
  examples:
    - 谨慎地修一下未登录访问 /settings 崩溃的问题（涉及鉴权别漏）
    - 严谨地把 parseConfig 改为接收路径而不是字符串，并修所有调用方
    - 这块是敏感模块，请仔细对照同类实现再动手
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
rework:
  enabled: true
  allowed_targets:
    - understand
    - investigate
    - align
    - design
    - implement
  approval_required: false
  invalidate_downstream: true
# v1.1 设计笔记（写给后来者）：
# v1.0 曾经用 required_outputs 强制 LLM 一次性产出 5 个对象数组（investigation_tasks /
# hypotheses / findings / plan_steps / phase_1_self_check 等）+ 跨阶段血脉断言。
# 实证结果：LLM 在长 prompt 下 JSON 频繁烂尾（candidate_count=9, bracket_balance=3），
# 无法在 retry 内自我修复，引擎层卡死。
# v1.1 回归软引导——instructions 描述思维例程、required_outputs 只留少量简单字段，
# 断言只保留扫文本/查结构存在性的低复杂度规则。思想仍在，硬约束让位给 LLM 的实际能力。
#
# v1.2 设计笔记（人类谨慎思维工程化）：
# 在 v1.1 软引导基础上新增 11 条思维例程 + 9 个扫标题/扫词断言，把"人类资深开发者的内在思维"
# （而非仅外在例程）工程化。仍守软约束——不新增任何 required_outputs 字段，断言只做扫标题/扫词存在性。
# - investigate：markdown 模板从 4 标题扩到 7 标题（+同类参考/调用方清单/边界与异常路径），
#   每条 finding 标置信度 [high/medium/low + 依据]，low 项须尝试第二证据源交叉验证。
# - design：必写核心 3 段（候选方案≥2 对照/方案评估四维/事前风险预演），按需写 6 段
#   （design_summary/adversarial_critique 降级/consistency_audit/success_criteria/测试清单/影响半径）。
# - implement：delta_check 每文件一段（推进哪条 success_criteria + 新风险）+ 不可逆操作回滚预案。
# - self_review：3 条闭环核对（优先核对 low/medium 置信项 + 调用方语义假设 + 测试清单执行）。
# design 段分必写/按需写以控 output_summary 长度，降低 JSON 烂尾风险。
# 烂尾回退策略：A 删 adversarial_critique；B 合并同类参考与调用方清单；C 放宽候选方案为≥1。
stages:
  - id: understand
    name: 理解
    instructions: |
      用简体中文复述用户的真实诉求与"完成的样子"。

      **自主推断原则**：
      - 能从用户任务描述、代码上下文、项目结构中自行推断的信息，不要问用户
      - 只有任务描述明显缺失关键信息、且无法从代码/文档中推断时，才列入 assumptions
      - assumptions 不是"问用户的问题"，而是"暂时这样假设，如有偏差再修正"

      **输出格式（非常重要）**：
      1. 直接输出 JSON 对象，**不要**包裹在 ```json 或 ``` 代码块里
      2. 键名必须用双引号包裹，如 `"status"` 不是 `status`
      3. 字符串值必须用双引号包裹，如 `"completed"` 不是 `completed`
      4. 数组元素用双引号包裹，如 `["假设 1"]` 不是 `[假设 1]`
      5. 不要有尾随逗号

      必须输出且只能输出以下 JSON 结构：
      ```json
      {"status":"completed","output_summary":"一句话总结","required_outputs":{"user_goal_restated":"用户想要什么","definition_of_done":"完成的标准","assumptions":[]}}
      ```
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - user_goal_restated
      - definition_of_done
      - assumptions
    auto_retry_limit: 5
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: investigate
    name: 取证
    instructions: |
      像资深开发者接手陌生模块的反射动作——**先拟定调查任务、逐条取证、复盘是否方案无虞、
      不放心就补任务再调查**。这是 Plan loop 的内循环；走完才允许下结论。

      **自主查证原则**：
      - 能 grep/read_file/git log 查到的信息，不要问用户
      - unknowns 里写的是"代码里没有明确答案"的事项，不是"我没去查"的事项
      - 如果查证后发现用户任务描述与实际代码不符，以代码为准，在 output_summary 里说明

      ⚠️ **output_summary（自然语言总结）必须按以下 markdown 模板写**（7 个标题不能省）：

      ```markdown
      ## 调查任务清单
      1. [ ] task_1: ... → [已查/未查]

      ## 假设与验证
      - H1: ... → [证实/证伪/inconclusive]
      （标 low 置信度的 finding 必须尝试第二证据源交叉验证，如 grep + git log + 测试三路印证；
       仍无法确认才标 low——交叉验证是"我尽力查了"的证明，不是可选项）

      ## 同类参考
      - 同类实现怎么写的：≥2 条 path:line + 模式说明
      （如"login.ts:42 用了 redirect-after-auth 模式"）

      ## 调用方清单
      - 目标符号的所有调用方 + 每处对其行为的语义假设
      （如"src/router/index.ts:88 调用 parseConfig，假定返回非 null"）
      - 无明确目标符号的任务（如新建文件）写"本次无目标符号"

      ## 已证实的结论
      1. f1: ...（证据：`file:line`，置信度：[high/medium/low] + 依据类型：代码直读/git log/推断）
      2. f2: ...

      ## 边界与异常路径
      - 已知需要处理的边缘情况：空/零/负/并发/超时/失败/超大输入
      （与 unknowns 互补：unknowns 是没查清的，boundary 是已知需处理的）

      ## 仍未确定的事项
      - ...（置信度：low + 为什么没查清）
      ```

      **置信度分级**（每条 finding 必标）：
      - **high**：代码直读确认 / git log 明确记录 / 测试跑过
      - **medium**：推断但有间接证据 / 同类代码风格类推
      - **low**：纯推断 / 未读到关键代码 / 依赖假设
      标 low 不是坏事，是诚实暴露——self_review 阶段会优先核对 low/medium 项。

      required_outputs（JSON 字段）保持精简：
        - similar_callsites: 覆盖"同类参考"+"调用方清单"两类，至少 3 条 path:line + 一句话作用
        - git_history_summary: 跑过的 git log/blame 关键结论（含 commit hash）
        - unknowns: 未查清的事项（写"无"也可以，但不能省略）

      ⚠️ JSON 输出前请先 JSON.parse 验证——多余引号/未闭合括号会导致 retry。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - similar_callsites
      - git_history_summary
      - unknowns
    auto_retry_limit: 3
    hooks:
      post_output_assertions:
        - investigate_structure_present
        - callsites_inventory_present
        - boundary_enumeration_present
        - confidence_levels_present
        - needs_rework_target_required
        - hedged_findings_demoted
        - unknowns_present
        - no_trailing_unparsed_payload
  - id: align
    name: 对齐
    instructions: |
      列出本次必须遵守的横向一致性约束（命名/错误处理/日志/i18n/参数风格等）。

      **自主决策原则**：能查代码确认的就不要问用户。只有以下情况才需要 ask_human：
      - 涉及不可逆操作（删文件、清数据、git reset --hard 等）
      - 需求有歧义且代码/文档无法确认
      - 需要在多个合理方案中做选择（且没有明显最优解）

      output_summary 里写明：横向约束清单 + 已自主确认的事项 +（如有）需要用户决策的问题。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - lateral_constraints
      - clarifications_asked
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: design
    name: 设计
    instructions: |
      把 investigate 阶段查实的结论翻成可执行步骤——**每一步都要引用对应的取证证据**，
      不允许凭空设计。

      **必写核心段（output_summary 必须含以下 3 个 markdown 标题，断言会校验）**：

      1. **## 候选方案**：先列 ≥2 候选方案并排比较，再写选定理由。写法：
         ```markdown
         ## 候选方案
         - 方案 A：...（要点 + 取舍维度：复杂度/风险/可逆性）
         - 方案 B：...（要点 + 同样维度）
         选定：方案 X，理由：...
         ```
         不允许只写一个方案就跳到下一项——"比较"本身就是思维过程，不是"先定再辩护"。

      2. **## 方案评估**：对**选定方案**给性能/安全/扩展/可维护四维简评（每维一两句 + 风险等级 high/med/low）。
         与候选方案的取舍矩阵互补——前者是方案间横向比较，后者是选定方案的纵深审视。
         ```markdown
         ## 方案评估
         - 性能：...（风险：low）
         - 安全：...（风险：med）
         - 扩展：...（风险：low）
         - 可维护：...（风险：low）
         ```

      3. **## 事前风险**：动手前预演失败——最易出错的两三处、最没把握的反例 + 预案。写法：
         ```markdown
         ## 事前风险
         - 风险 1：...（最易出错的点 + 触发条件 + 预案）
         - 风险 2：...（最没把握的反例 + 验证手段）
         ```
         这是"事前预演"，不是事后挑刺——挑的是"我自己心里都没底的地方"。

      **按需写段（软约束，不强制作断言；涉及就写，靠 self_review 兜底）**：
      - **design_summary**：方案要点（要做什么、怎么做、涉及哪些文件）
      - **adversarial_critique**：敌对自审——reviewer 视角会怎么打回？至少 3 条具体反驳并答辩
        （与事前风险+方案评估有重叠，按需写，避免 output_summary 过长）
      - **consistency_audit**：一致性自审——同类条目要么全做要么全不做；任何偏离写出理由
      - **success_criteria**（推荐写）：完成的样子，便于 self_review 核对
      - **测试清单**：涉及逻辑改动时列需新增/修改的测试 + 覆盖哪条 success_criteria
      - **影响半径**：涉及公共接口/共享数据时列改动波及的下游（含间接传递依赖）

      避免过度抽象/过度工程：能用现有函数解决就不要新建。
    allowed_tools:
      - read_file
    required_outputs: []
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - design_alternatives_present
        - design_quadrant_eval_present
        - preflight_risks_present
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: implement
    name: 实施
    instructions: |
      严格按 design 实施最小改动；偏离 design 必须 needs_rework 回到 design。
      改任何一个文件之前，先确保你真的读过它（不只是 grep 过 basename）：
        - 同一目标文件的 Read/Grep 次数 ≥ 3；
        - 本会话内对该文件跑过一次 git log；
        - 涉及不可逆 shell 操作时，先 ask_human 取得用户同意。
      宿主会在工具调用前强制校验上述前置条件，未达到会被 deny 并要求你补齐。这不是平台限制，
      是"先看后改"的纪律。

      **改动核对（delta_check，必写）**：每改完一个文件，在 output_summary 里用 markdown 分段
      写一段 delta_check——推进了哪条 success_criteria + 引入了什么新风险。写法：
      ```markdown
      ## 改动核对
      ### src/auth/login.ts
      - 推进：success_criteria 第 2 条（未登录跳转 /settings）
      - 新风险：引入了 redirect 时序依赖，需 self_review 跑一遍 e2e
      ### src/router/index.ts
      - 推进：success_criteria 第 1 条
      - 新风险：无
      ```
      如果本次未改动任何文件，仍要写一段"## 改动核对：本次未改动，原因：..."。
      这是"过程中"的自审——不是等 self_review 才发现走偏。每改完一个文件就对照
      understand.user_goal_restated 与 design.success_criteria 核对，发现走偏及时 needs_rework
      回 design，不要等到 self_review 阶段才发现。

      **回滚预案**：涉及不可逆操作（rm/git reset/drop table/truncate 等）时，在对应文件的
      delta_check 子段内写明回滚步骤（如何撤销本次不可逆操作）。

      改动尽量小、贴近原代码风格。坚决不顺手"清理无关代码"。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
    auto_retry_limit: 1
    hooks:
      pre_tool_use:
        # 注意：Write 不在此列。Write 主要用于新建文件，目标路径还不存在时无法
        # "先 Read/Grep 3 次"，硬挂会让"新建文件"类任务卡死或刷形式次数。
        # Write 的纪律靠 design + self_review 兜底。
        - when:
            tool:
              - Edit
              - MultiEdit
          require:
            same_file_reads_min: 3
            shell_must_have_run:
              - "git log "
          on_fail: "改既有代码之前请先充分了解上下文：对目标文件至少 Read/Grep 3 次，并对它跑过一次 git log。"
        - when:
            tool: Bash
            command_contains:
              - "rm "
              - "git reset"
              - "git clean"
              - "drop table"
              - "truncate"
          require:
            ask_human_consent: true
          on_fail: "这是不可逆操作，必须先在本阶段通过 ask_human 取得用户明确确认。"
      post_output_assertions:
        - implement_delta_check_present
        - rollback_plan_when_irreversible
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: self_review
    name: 自审
    instructions: |
      你现在是一个独立的、敌对的 code reviewer，**不是作者**，看不到 implement 阶段的辩解，只看代码事实。
      逐条核对 align.lateral_constraints 与 align.boundary_questions（在前序阶段 output_summary 中可读）
      对应到当前 diff：
        - 漏覆盖的项目必须写明缺口；
        - 即使全部覆盖，也要在 review_findings 给出一份"逐项核对"清单（每条约束/边界 → 在 diff 哪里被处理）。

      review 的内功（写在 output_summary 里，不强制结构化字段）：
        - 真去跑测试/构建/lint——不允许只口头说"应该通过"；如果跑了，把命令与结果摘要写在 review_findings；
        - 三维度挑刺：性能 / 安全 / 扩展性——发现 high 级风险时不允许 pass；
        - 自洽性纪律：一旦 review_findings/residual_risks 出现"blocker / critical / 严重不一致 / 安全问题 /
          高优先级问题"这类阻塞类描述，就**不允许**把 rework_decision 写成 pass——
          要么改描述（已修复 + diff 位置）、要么改 needs_rework。引擎会自动判定不自洽并回炉重做。

      **三条闭环核对（v1.2 新增，必须执行）**：
        - **优先核对低置信项**：investigate 阶段标了置信度（high/medium/low）的 finding，
          优先核对 low 与 medium 项是否在本次 diff 中被验证或反驳。low/medium 项未核对就 pass 视为漏审。
        - **核对调用方清单每处的语义假设**：investigate 的"## 调用方清单"列了每个调用方对目标符号的
          语义假设（如"调用方假定返回非 null"）。逐条核对本次改动是否打破了这些假设——打破必须 needs_rework。
        - **核对测试清单是否执行**：design 阶段的"测试清单"（如有）列了需新增/修改的测试。核对是否在
          implement 落地、self_review 跑过；未执行的测试必须在 review_findings 写明缺口。

      返工触发协议：
        - 决定回炉时，最外层 JSON 必须 status="needs_rework"、rework_target_stage_id 是
          implement/design/investigate 之一、rework_reason 用一两句中文说明缺口；
        - 不要把 needs_rework 仅写进 rework_decision 字段——引擎只识别最外层 status。
        - 通过时：status="completed"，rework_decision="pass"，review_findings 必须给出逐项核对清单。

      仅允许只读工具：Read 看 diff、shell 跑 git diff/test/build/lint，禁止 edit。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - review_findings
      - rework_decision
      - residual_risks
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - review_self_consistency
        - needs_rework_target_required
        - hedged_findings_demoted
        - no_trailing_unparsed_payload
