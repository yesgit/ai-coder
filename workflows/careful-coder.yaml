id: careful-coder
name: 谨慎程序员
version: 3.0.0
description: |
  唯一内置工作流：先根据项目情况执行全量或增量项目画像，建立或调整长期上下文；
  再按理解、勘察、对齐、方案、实施、自审推进编码任务。
  所有阶段通过统一 output_schema 传递结构化状态，后续阶段按同一口径消费前序产物，
  缺口通过 needs_rework 回溯修正。
source:
  type: builtin
  id: careful-coder
  version: 3.0.0
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: true
  network:
    enabled: false
routing:
  enabled: true
  auto_start: true
  # v2 与 v1.3 并存做对比基线；暂不自动接管，手动选用。验证 v2 更优后可切换 auto_start。
  keywords:
    - 谨慎 v2
    - careful v2
  examples:
    - 谨慎地修一下未登录访问 /settings 崩溃的问题
    - 严谨地把 parseConfig 改为接收路径而不是字符串，并修所有调用方
rework:
  enabled: true
  allowed_targets:
    - scan_project
    - update_project_profile
    - understand
    - investigate
    - align
    - design
    - implement
  approval_required: false
  invalidate_downstream: true
# v2.1 设计笔记（承接 docs/workflow-design-principles.md 的反思）：
# v1.0→v1.3 三轮都在"用产出形态/行为保证思维质量"的范畴错误里打转：L3 扫标题可被空壳糊弄，
# L1 查行为虽难糊弄但把"动作发生"当成"谨慎发生"——两者都是用可观测代理指标保证不可观测心智。
# v2.0 换路：保留人类思维的阶段骨架（人类本就分阶段思考），但阶段内部靠 prompt 落实心智。
# v2.1 承认单靠 prompt 会在阶段边界丢心智：关键状态必须进入 required_outputs，并由后续阶段消费。
# 断言仍只留三类不可糊弄且不制造仪式的：
#   1. 结构性（no_trailing_unparsed_payload / needs_rework_target_required）——防 JSON 烂尾、rework 缺字段
#   2. L2 自洽性（review_self_consistency / hedged_findings_demoted / unknowns_present）——查可验证事实/自洽
#   3. 安全门（不可逆操作 ask_human consent / rollback_plan）——安全，非谨慎仪式
# L3 扫标题全退场；L1 behavior 门控（git log/git diff 的 retry/block）降回 prompt 提示——
# "你应该跑 git log"是建议，不是"跑过才算调查过"的证据勒索。
# 思维模板（候选方案/事前风险/置信度/调用方清单/delta_check）仍在 instructions 里作引导；
# 承重信息进入 required_outputs，使 design/implement/self_review 有同一份可复用状态，而非靠重读摘要猜测。
stages:
  - id: scan_project
    name: 扫描项目画像
    instructions: |
      这是所有开发任务的前置阶段：先判断当前项目画像是否存在、是否过期，以及本次应做全量画像还是增量画像。
      检查项目根目录和 .claude/ 目录下是否已有 CLAUDE.md、.claude/CLAUDE.md、CLAUDE.local.md、.claude/rules/、.claude/skills/、.claude/settings.json、.mcp.json、AGENTS.md、其他工具规则文件。
      若项目没有画像资产，执行全量画像扫描：阅读 README、包清单、主要配置、关键源码入口、测试/CI/脚本目录，建立项目地图。
      若已有画像资产，或用户要求刷新/调整画像，优先执行增量画像：阅读已有画像资产、git status、近期 diff/提交摘要、本次任务直接相关文件，判断哪些画像内容需要更新。
      避开密钥、凭证、生成依赖目录、大型构建产物和二进制文件。PDF/图片附件按宿主提供的 file_ref 或拆页 PNG 读取，不要直接读取原始 PDF。
      不要为了画像而无边界扫描；以“后续编码阶段是否有足够项目上下文”为判断标准。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - profile_mode
      - existing_profile_assets
      - inspected_files
      - project_facts
      - profile_update_needed
    output_schema:
      profile_mode:
        type: string
        enum:
          - full
          - incremental
          - none
        description: full=无画像或结构大变需全量画像；incremental=已有画像且只需局部调整；none=画像足够且本次无需更新
      existing_profile_assets:
        type: array
        items: string
        description: 已发现的画像资产路径；没有则 []
      inspected_files:
        type: array
        items:
          type: object
          properties:
            file: string
            evidence: string
        description: 本阶段实际阅读/检查的文件及提供的事实
      project_facts:
        type: array
        items: string
        description: 后续编码必须知道的稳定项目事实
      profile_update_needed:
        type: array
        items: string
        description: 需要建立或调整画像的事项；无需更新则 ["无"]
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: update_project_profile
    name: 建立或调整项目画像
    instructions: |
      根据 scan_project 的结论建立或调整项目画像。全量模式下创建简洁、可维护、适合作为长期上下文的 CLAUDE.md；增量模式下只修改受近期变化影响的画像内容；none 模式下不写文件，只说明无需更新依据。
      主 CLAUDE.md 应聚焦长期稳定事实：项目概览、技术栈、架构边界、常用命令、验证路径、开发规则、安全边界、容易误导代理的陷阱、画像更新策略。
      如已有 CLAUDE.md/rules/skills/settings，必须保留仍然正确的团队规则；只修正过期或缺失内容，不做无关重排。
      .claude/rules 只用于有明确路径作用域的规则；.claude/skills 只用于重复、多步骤、长期有价值的流程；settings 只建议团队共享配置，不写密钥、个人偏好、本机绝对路径。
      如需要写文件，使用最小改动，并在 validation 中说明读取/写入/未执行的验证。无法写入时不要中断后续编码阶段，把缺口写入 required_outputs。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
    required_outputs:
      - profile_changes
      - profile_paths
      - retained_rules
      - validation
      - residual_profile_risks
    output_schema:
      profile_changes:
        type: array
        items:
          type: object
          properties:
            action: string
            target: string
            reason: string
        description: 建立/更新/跳过画像的动作清单
      profile_paths:
        type: array
        items: string
        description: 已创建或更新的画像资产路径；无改动则 []
      retained_rules:
        type: array
        items: string
        description: 明确保留的已有团队规则或画像内容
      validation:
        type: object
        properties:
          commands_executed: array<string>
          results: string
          skipped_validations: array<string>
        description: 已执行验证和跳过原因
      residual_profile_risks:
        type: array
        items: string
        description: 画像仍需人工确认的事项；没有则 ["无"]
    auto_retry_limit: 1
    hooks:
      pre_tool_use:
        - when:
            tool: Bash
            command_contains:
              - "rm "
              - "git reset"
              - "git clean"
              - "drop table"
              - "truncate"
          require:
            ask_human_consent: true
          on_fail: "这是不可逆操作，必须先通过 ask_human 取得用户明确确认。"
      post_output_assertions:
        - rollback_plan_when_irreversible
        - no_trailing_unparsed_payload
  - id: understand
    name: 理解
    instructions: |
      用简体中文复述用户的真实诉求与"完成的样子"。

      **自主推断原则**：
      - 能从用户任务描述、代码上下文、项目结构中自行推断的信息，不要问用户
      - 只有任务描述明显缺失关键信息、且无法从代码/文档中推断时，才列入 assumptions
      - assumptions 不是"问用户的问题"，而是"暂时这样假设，如有偏差再修正"

      **输出格式（非常重要）**：
      1. 直接输出 JSON 对象，**不要**包裹在 ```json 或 ``` 代码块里
      2. 键名必须用双引号包裹，如 `"status"` 不是 `status`
      3. 字符串值必须用双引号包裹，如 `"completed"` 不是 `completed`
      4. 数组元素用双引号包裹，如 `["假设 1"]` 不是 `[假设 1]`
      5. 不要有尾随逗号

      必须输出且只能输出以下 JSON 结构：
      ```json
      {"status":"completed","output_summary":"一句话总结","required_outputs":{"user_goal_restated":"用户想要什么","definition_of_done":["可观测完成标准 1"],"assumptions":[]}}
      ```
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - user_goal_restated
      - definition_of_done
      - assumptions
    output_schema:
      user_goal_restated:
        type: string
        description: 用户真实诉求的一句话复述
      definition_of_done:
        type: array
        items: string
        description: 可观测完成标准列表
      assumptions:
        type: array
        items: string
        description: 自主推断的保守假设；没有则 []
    auto_retry_limit: 5
    hooks:
      post_output_assertions:
        - no_trailing_unparsed_payload
  - id: investigate
    name: 勘察
    instructions: |
      像资深开发者接手陌生模块的反射动作——**带着假设边看边修正**。不是先列一张调查任务清单
      逐条打勾，而是形成一个初步假设，去代码/历史里验证，验证结果修正假设，再去看下一处。
      走完才允许下结论。

      **自主查证原则**：
      - 能 grep/read_file/git log 查到的信息，不要问用户
      - unknowns 里写的是"代码里没有明确答案"的事项，不是"我没去查"的事项
      - 如果查证后发现用户任务描述与实际代码不符，以代码为准，在 output_summary 里说明

      像人类那样思考（写进 output_summary 自然语言总结，引擎不扫这些形态——靠你自觉）：
      - **调查任务与假设**：你打算查什么、初始假设是什么、查证后假设成立/推翻/需修正
      - **同类参考**：同类实现怎么写的，给 ≥2 条 path:line + 模式说明
      - **调用方清单**：目标符号的所有调用方 + 每处对其行为的语义假设
        （如"src/router/index.ts:88 调用 parseConfig，假定返回非 null"）；无目标符号写"本次无目标符号"
      - **已证实的结论**：每条给证据 `file:line` + 置信度 [high/medium/low] + 依据类型（代码直读/git log/推断）
      - **边界与异常路径**：已知需要处理的边缘情况（空/零/负/并发/超时/失败/超大输入）

      **建议跑 `git log`/`git blame` 看历史**——了解这段代码为什么长成现在这样，常常比读当前代码
      更能避免重复历史错误。这是建议而非硬性要求（引擎不核对你是否跑过），但资深开发者几乎不会跳过。

      **置信度分级**（每条结论必标）：
      - **high**：代码直读确认 / git log 明确记录 / 测试跑过
      - **medium**：推断但有间接证据 / 同类代码风格类推
      - **low**：纯推断 / 未读到关键代码 / 依赖假设
      标 low 不是坏事，是诚实暴露——self_review 阶段会优先核对 low/medium 项。

      required_outputs（JSON 字段）保持精简：
        - similar_callsites: 覆盖"同类参考"+"调用方清单"两类，至少 3 条 path:line + 一句话作用
        - evidence_findings: 已证实结论列表；每条包含结论、证据 path:line、置信度 high/medium/low、依据类型
        - callsite_assumptions: 调用方语义假设清单；无目标符号写"本次无目标符号"
        - boundary_cases: 已知需要处理或确认的边界与异常路径
        - unknowns: 未查清的事项（写"无"也可以，但不能省略——沉默不算回答）

      ⚠️ JSON 输出前请先 JSON.parse 验证——多余引号/未闭合括号会导致 retry。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - similar_callsites
      - evidence_findings
      - callsite_assumptions
      - boundary_cases
      - unknowns
    output_schema:
      similar_callsites:
        type: array
        items:
          type: object
          properties:
            path_line: string
            pattern: string
        description: 同类参考与调用方清单，至少 3 条 path:line + 模式说明
      evidence_findings:
        type: array
        items:
          type: object
          properties:
            finding: string
            evidence: string
            confidence: high | medium | low
            basis: 代码直读 | git log | 测试 | 推断
        description: 已证实结论列表
      callsite_assumptions:
        type: array
        items: string
        description: 调用方语义假设清单；无目标符号写 ["本次无目标符号"]
      boundary_cases:
        type: array
        items: string
        description: 已知需要处理或确认的边界与异常路径
      unknowns:
        type: array
        items: string
        description: 未查清事项；没有则 ["无"]
    auto_retry_limit: 3
    hooks:
      post_output_assertions:
        - needs_rework_target_required
        - unknowns_present
        - no_trailing_unparsed_payload
  - id: align
    name: 对齐
    instructions: |
      列出本次必须遵守的横向一致性约束（命名/错误处理/日志/i18n/参数风格等）。

      **自主决策原则**：能查代码确认的就不要问用户。只有以下情况才需要 ask_human：
      - 涉及不可逆操作（删文件、清数据、git reset --hard 等）
      - 需求有歧义且代码/文档无法确认
      - 需要在多个合理方案中做选择（且没有明显最优解）

      required_outputs.lateral_constraints 要写成可核对清单：必须是合法 JSON 数组；每条是对象，包含 constraint、evidence、implication 三个字符串字段，分别表示约束、证据来源/同类位置、对本次改动的含义。不要输出裸 key/value 清单。
      output_summary 里写明：横向约束清单 + 已自主确认的事项 +（如有）需要用户决策的问题。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - lateral_constraints
    output_schema:
      lateral_constraints:
        type: array
        items:
          type: object
          properties:
            constraint: string
            evidence: string
            implication: string
        description: 横向一致性约束清单；每项包含约束、证据来源/同类位置、对本次改动的含义
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: design
    name: 方案
    instructions: |
      把 investigate 勘实的结论翻成可执行步骤——**每一步都要引用对应的取证证据**，不允许凭空设计。

      像人类资深开发者那样在 output_summary 里把设计思考写清楚（引擎不扫标题形态，靠你自觉把
      思考过程写明白，而非填空壳）：

      - **候选方案对照**：先列 ≥2 候选并排比较（取舍维度：复杂度/风险/可逆性），再写选定理由。
        不允许只写一个方案就跳到实施——"比较"本身就是思维过程，不是"先定再辩护"。
      - **方案评估**：对选定方案给性能/安全/扩展/可维护四维简评（每维一两句 + 风险等级 high/med/low）。
      - **事前风险预演**：动手前预演失败——最易出错的两三处、最没把握的反例 + 预案。
        这是"事前预演"，不是事后挑刺——挑的是"我自己心里都没底的地方"。
      - **成功标准**（推荐）：完成的样子，便于 self_review 核对。
      - **测试清单**（涉及逻辑改动时）：需新增/修改的测试 + 覆盖哪条成功标准。
      - **影响半径**（涉及公共接口/共享数据时）：改动波及的下游（含间接传递依赖）。

      避免过度抽象/过度工程：能用现有函数解决就不要新建。
      required_outputs 必须提供：
        - selected_plan: 选定方案的步骤清单；每步引用 investigate.evidence_findings 或 align.lateral_constraints 的证据
        - success_criteria: 可验证完成标准；承接 understand.definition_of_done
        - test_plan: 要跑/要新增/可接受跳过的验证；跳过必须写理由
        - risk_register: 事前风险与预案；至少覆盖最易错处、最低置信处、回滚/返工触发条件
    allowed_tools:
      - read_file
    required_outputs:
      - selected_plan
      - success_criteria
      - test_plan
      - risk_register
    output_schema:
      selected_plan:
        type: array
        items:
          type: object
          properties:
            step: string
            evidence_refs: array<string>
        description: 选定方案步骤清单；每步引用 investigate.evidence_findings 或 align.lateral_constraints
      success_criteria:
        type: array
        items: string
        description: 可验证完成标准，承接 understand.definition_of_done
      test_plan:
        type: array
        items:
          type: object
          properties:
            check: string
            covers: string
            skip_reason: string
        description: 要跑/要新增/可接受跳过的验证；跳过必须写 skip_reason
      risk_register:
        type: array
        items:
          type: object
          properties:
            risk: string
            mitigation: string
            trigger: string
        description: 事前风险与预案，覆盖最易错处、最低置信处、回滚/返工触发条件
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: implement
    name: 实施
    instructions: |
      严格按 design 实施最小改动；偏离 design 必须 needs_rework 回到 design。

      **任务点驱动（基于真实需要，不刷次数）**：
      动手前先想清楚——总体目标（understand.user_goal_restated）和本阶段目标（design 成功标准）是什么？
      基于真实需要列出本次要做的 Points（要读哪些文件、改哪些、跑什么验证），逐步执行，每步对照目标自检：
        - 这个 Point 做完了吗？还偏离总体目标吗？需要回 design 吗？
        - "看几次"由真实需要决定——理解了就不必再读，没理解就读到理解为止。不为凑次数而刷 Read。
        - 涉及不可逆 shell 操作（rm/git reset/drop table/truncate）时，先 ask_human 取得用户同意（宿主强制）。
      "先看后改"是纪律，但次数不硬性门控（那会让模型为凑次数而形式读取）。改由你自检是否真的理解了目标文件。

      **边写边核对**：每改完一个文件，在 output_summary 里写一段"改动核对"——推进了哪条
      success_criteria + 引入了什么新风险。写法：
      ```markdown
      ### src/auth/login.ts
      - 推进：success_criteria 第 2 条（未登录跳转 /settings）
      - 新风险：引入了 redirect 时序依赖，需 self_review 跑一遍 e2e
      ```
      如果本次未改动任何文件，仍写一段说明原因。这是"过程中"的自审——不是等 self_review
      才发现走偏。每改完一个文件就对照 understand.user_goal_restated 与 design 成功标准核对，
      发现走偏及时 needs_rework 回 design。
      required_outputs 必须提供：
        - changed_files: JSON 数组；本阶段实际改动/未改动的文件清单与原因；每项是对象，至少包含 file、changes
        - delta_checks: JSON 数组；每个改动文件推进了哪条 success_criteria、引入什么风险、如何验证；每项是对象，至少包含 file、success_criteria_addressed、new_risks、verification
        - validation_run: JSON 对象；已执行的验证命令/结果；未执行要写原因与残余风险；至少包含 commands_executed、results、skipped_validations、residual_risks
      required_outputs 后面只能有一个对象：写成 "required_outputs": { ... }，不要写成 "required_outputs": {{ ... }}。

      **回滚预案**：涉及不可逆操作（rm/git reset/drop table/truncate 等）时，在对应文件的
      改动核对子段内写明回滚步骤（如何撤销本次不可逆操作）。

      改动尽量小、贴近原代码风格。坚决不顺手"清理无关代码"。
    allowed_tools:
      - read_file
      - edit_file
      - shell
    gates:
      - authorized_files_only
    required_outputs:
      - changed_files
      - delta_checks
      - validation_run
    output_schema:
      changed_files:
        type: array
        items:
          type: object
          properties:
            file: string
            changes: array<string>
            reason: string
        description: 本阶段实际改动/未改动的文件清单与原因
      delta_checks:
        type: array
        items:
          type: object
          properties:
            file: string
            success_criteria_addressed: array<string>
            new_risks: array<string>
            verification: string
        description: 每个改动文件推进的成功标准、引入风险、验证方式
      validation_run:
        type: object
        properties:
          commands_executed: array<string>
          results: string
          skipped_validations: array<string>
          residual_risks: string
        description: 已执行验证命令/结果；未执行写原因与残余风险
    auto_retry_limit: 1
    hooks:
      pre_tool_use:
        # v2.1：去掉 same_file_reads_min + shell_must_have_run 的"读≥3次+跑过git log"硬门控——
        # 它是 Goodhart 源：模型为凑次数而形式刷 Read，而非基于真实需要理解文件。改为 prompt
        # 引导任务点驱动 + 自检（见 instructions）。只保留不可逆操作的 ask_human consent（安全门）。
        - when:
            tool: Bash
            command_contains:
              - "rm "
              - "git reset"
              - "git clean"
              - "drop table"
              - "truncate"
          require:
            ask_human_consent: true
          on_fail: "这是不可逆操作，必须先在本阶段通过 ask_human 取得用户明确确认。"
      post_output_assertions:
        - rollback_plan_when_irreversible
        - needs_rework_target_required
        - no_trailing_unparsed_payload
  - id: self_review
    name: 自审
    instructions: |
      你现在是一个独立的、敌对的 code reviewer，**不是作者**，看不到 implement 阶段的辩解，只看代码事实。
      优先读取前序阶段 required_outputs，而不是只看 output_summary：
        - understand.definition_of_done
        - investigate.evidence_findings / callsite_assumptions / boundary_cases / unknowns
        - align.lateral_constraints
        - design.success_criteria / test_plan / risk_register
        - implement.changed_files / delta_checks / validation_run
      逐条核对这些结构化状态对应到当前 diff：
        - 漏覆盖的项目必须写明缺口；
        - 即使全部覆盖，也要在 review_findings 给出一份"逐项核对"清单（每条约束/边界 → 在 diff 哪里被处理）。

      review 的内功（写在 output_summary 里，不强制结构化字段）：
        - 真去跑测试/构建/lint——不允许只口头说"应该通过"；如果跑了，把命令与结果摘要写在 review_findings；
        - **建议跑 `git diff` 看本次改动**——敌对自审的前提是真看了 diff，不是口头说"应该通过"。
          这是建议而非硬性要求（引擎不核对），但没看 diff 就 pass 是空审。
        - 三维度挑刺：性能 / 安全 / 扩展性——发现 high 级风险时不允许 pass；
        - 自洽性纪律：一旦 review_findings/residual_risks 出现"blocker / critical / 严重不一致 / 安全问题 /
          高优先级问题"这类阻塞类描述，就**不允许**把 rework_decision 写成 pass——
          要么改描述（已修复 + diff 位置）、要么改 needs_rework。引擎会自动判定不自洽并回炉重做。

      **三条闭环核对**：
        - **优先核对低置信项**：investigate 标了置信度的 finding，优先核对 low 与 medium 项是否在
          本次 diff 中被验证或反驳。low/medium 项未核对就 pass 视为漏审。
        - **核对调用方清单每处的语义假设**：investigate.callsite_assumptions 列了每个调用方对目标符号的语义假设
          （如"调用方假定返回非 null"）。逐条核对本次改动是否打破了这些假设——打破必须 needs_rework。
        - **核对测试清单是否执行**：design.test_plan 列了需新增/修改/运行的测试。核对是否在
          implement.validation_run 落地、self_review 跑过；未执行的测试必须在 review_findings 写明缺口。

      返工触发协议：
        - 决定回炉时，最外层 JSON 必须 status="needs_rework"、rework_target_stage_id 是
          implement/design/investigate 之一、rework_reason 用一两句中文说明缺口；
        - 不要把 needs_rework 仅写进 rework_decision 字段——引擎只识别最外层 status。
        - 通过时：status="completed"，rework_decision="pass"，review_findings 必须给出逐项核对清单。

      仅允许只读工具：Read 看 diff、shell 跑 git diff/test/build/lint，禁止 edit。
    allowed_tools:
      - read_file
      - shell
    required_outputs:
      - review_findings
      - rework_decision
      - residual_risks
    output_schema:
      review_findings:
        type: array
        items:
          type: object
          properties:
            item: string
            finding: string
            evidence: string
            severity: info | low | medium | high | critical
        description: 逐项核对清单；每条约束/边界/测试项对应 diff 或验证证据
      rework_decision:
        type: string
        enum:
          - pass
          - needs_rework
        description: 通过写 pass；需要返工时最外层 status 也必须是 needs_rework
      residual_risks:
        type: array
        items: string
        description: 剩余风险；没有则 ["无"]
    auto_retry_limit: 1
    hooks:
      post_output_assertions:
        - review_self_consistency
        - needs_rework_target_required
        - hedged_findings_demoted
        - no_trailing_unparsed_payload
