id: chat
name: 闲聊对话
version: 1.0.0
description: 支持持续多轮对话的闲聊模式
source:
  type: builtin
  id: chat
  version: 1.0.0
routing:
  enabled: true
  auto_start: true
  keywords:
    - 你好
    - 嗨
    - 谢谢
    - hello
  examples:
    - 你好，聊聊今天的开发安排
    - 谢谢你的帮助
permissions:
  filesystem:
    mode: project-only
  shell:
    approval_required: false
  network:
    enabled: false
stages:
  - id: respond
    name: 回应用户
    instructions: |
      用简体中文回应用户的消息。
      这是一个持续对话阶段 — 每次用户发送新消息时，你都需要回应。
      保持对话自然、友好，像同事间聊天一样。
      如果用户询问技术问题，可以提供帮助，但不需要主动执行代码或修改文件。
      如果用户想要执行具体任务，可以建议使用其他工作流（如"计划执行"或"软件工程"）。
      在回应前，先查看会话历史中的对话记录，确保回应连贯。
    # 没有 required_outputs — 对话本身就是输出
    # 没有 required_checks — 闲聊不需要验证
